components:
  schemas:
    BaseAuditFields:
      type: object
      properties:
        createdOn:
          type: string
          format: date-time
          x-fn-created-date: true
        updatedOn:
          type: string
          format: date-time
          x-fn-last-modified-date: true
        createdBy:
          type: string
          readOnly: true
        updatedBy:
          type: string
          readOnly: true
        active:
          type: boolean
      description: Common base class with audit fields
      discriminator:
        propertyName: type
      x-fn-jpa-entity:
        custom-annotations: '@MappedSuperclass'
    ErrorField:
      type: object
      properties:
        objectName:
          type: string
        field:
          type: string
        message:
          type: string
      x-fn-base-dto-type: NO_OP
    EmployeeRole:
      type: string
      enum:
      - EMPLOYEE
      - MANAGER
      - SENIOR_MANAGER
      - ADMIN
      - HR
    EmployeeHierarchyNode:
      required:
      - employee
      type: object
      properties:
        employee:
          description: employee details
          allOf:
          - $ref: "#/components/schemas/Employee"
          x-fn-fragment-projection:
          - SUMMARY
        children:
          type: array
          description: employees reporting to this employee
          items:
            $ref: "#/components/schemas/EmployeeHierarchyNode"
    Organization:
      required:
      - address
      - name
      type: object
      properties:
        id:
          type: string
          format: uuid
          x-fn-id: true
          x-fn-jpa-property:
            id-generator:
              strategy: UUID
            custom-annotations: '@JdbcTypeCode(SqlTypes.VARCHAR)'
        name:
          type: string
          x-fn-fragment-projection:
          - SUMMARY
          - FULL
        address:
          allOf:
          - $ref: "#/components/schemas/Address"
          x-fn-jpa-property:
            embedded: true
          x-fn-fragment-projection:
          - FULL
        employees:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
          x-fn-jpa-property:
            ref:
              one-to-many:
                fetch: lazy
                mapped-by: organization
                cascade:
                - PERSIST
                - REFRESH
                orphan-removal: true
              join-column:
                nullable: false
          x-fn-fragment-projection:
          - FULL
      allOf:
      - $ref: "#/components/schemas/BaseAuditFields"
      x-fn-jpa-entity:
        name: organizations
    User:
      required:
      - address
      - email
      - firstname
      - lastname
      - phone
      type: object
      properties:
        id:
          type: string
          format: uuid
          x-fn-id: true
          x-fn-jpa-property:
            id-generator:
              strategy: UUID
            custom-annotations: '@JdbcTypeCode(SqlTypes.VARCHAR)'
        firstname:
          type: string
          x-fn-scope:
          - DTO
          - JPA
          - ES
          x-fn-fragment-projection:
          - SUMMARY
          - FULL
        lastname:
